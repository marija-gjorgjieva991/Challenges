<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <title>Reservation</title>
  </head>

  <body>
    <nav>
      <a href="index.html"><i class="fa-solid fa-arrow-left"></i>Back link</a>
    </nav>
    <section>
     <center>
        <h1><u>Contact Us/Make a Reservation</u></h1>
        <form method="post">
          <label for="name">Name:</label>
          <input type="text" id="name" required /><br /><br />
          <label for="email">Email:</label>
          <input type="email" id="email" required /><br /><br />
          <label for="phone">Phone:</label>
          <input type="number" id="phone" required /><br /><br />
          <label for="date">Date:</label>
          <input type="date" id="date" required /><br /><br />
          <label for="time">Time:</label>
          <input type="time" id="time" required /><br /><br />
          <label for="number">Number of people:</label>
          <input type="number" id="number" required>
          <br /><br />
          
          <label>Seating Preferences:</label>
          <input type="radio" id="indoor" name="option1" />
          <label for="indoor">Indoor</label>
          <input type="radio" id="outdoor" name="option1"/>
          <label for="outdoor">Outdoor</label><br /><br />
          <label>Special Requests:</label>
          <input type="checkbox" id="choice1" />
          <label for="choice1">Vegetarian Options</label>
          <input type="checkbox" id="choice2" />
          <label for="choice2">Allergy Friendly</label>
          <input type="checkbox" id="choice3" />
          <label for="choice3">Window Seat</label>
          <input type="checkbox" id="choice4" />
          <label for="choice4">Need a Highchair</label>
          <input type="checkbox" id="choice5" />
          <label for="choice5">Celebrating a Special Occasion</label
          ><br /><br />
         
          <label for="note">Additional Notes:</label><br>
          <textarea name="comment" id="note" cols="18" rows="2"></textarea><br><br>

          <button type="submit">Submit Reservation</button></center></div>
        </form>
      
    </section><br><br>
    <footer>
      <center>
        <p>
          Follow us on
          <a href="https://www.instagram.com/" target="_blank">instagram</a>!
        </p>
        <p>
          <i class="fa-regular fa-copyright"></i> 2024 The Urban Garden
          Restaurant. All rights reserved.
        </p>
      </center>
    </footer>
  </body>
</html>
