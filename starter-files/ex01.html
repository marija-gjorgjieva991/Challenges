<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Excercise 01</title>
  </head>
  <body>
    <h1>Excercise 01 - Validate IP address</h1>
    <script>
      function isIPv4Address(input) {
        const ip = input.split(".");
        if (ip.length !== 4) {
          return false;
        }

        for (let part of ip) {
          const num = parseInt(part, 10);
          if (isNaN(num) || num < 0 || num > 255 || part !== num.toString()) {
            return false;
          }
        }

        return true;
      }

      console.log(isIPv4Address("172.16.254.1"));
      console.log(isIPv4Address("172.316.254.1"));
      console.log(isIPv4Address(".254.255.1"));
    </script>
  </body>
</html>
