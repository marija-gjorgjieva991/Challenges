<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Excercise 01</title>
  </head>
  <body>
    <script>
      let array = new Array();
      let newArr = new Array();
      myH = document.createElement("h2");

      for (i = 0; i < 6; i++) {
        array[i] = +prompt("Enter numbers:");
      }

      function transformArray(arr) {
        for (i = 0; i < arr.length; i++) {
          if (array[i] < 10) {
            newArr[i] = array[i] * 2;
          } else {
            newArr[i] = array[i] * 4;
          }
        }
        myH.innerText = "Transformed array is: [" + newArr + "]";
        document.body.appendChild(myH);
      }

      transformArray(array);
    </script>
  </body>
</html>
