<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Excercise 02</title>
  </head>
  <body>
    <script>
      let queue = [];

      function enqueue(item) {
        queue.push(item);
      }

      function dequeue(item) {
        if (queue.length > 0) {
          queue.shift(item);
          console.log(queue);
        } else {
          console.log("The array is empty");
        }

        return queue;
      }

      dequeue();
      enqueue(5);
      enqueue(1);
      enqueue(2);
      enqueue(3);
      enqueue(4);
      enqueue(5);
      enqueue(6);
      dequeue();
    </script>
  </body>
</html>
