<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Excercise 03</title>
  </head>
  <body>
    <div id="tableContainer"></div>
    <script>
      let rows = +prompt("Enter number of rows:");
      let columns = +prompt("Enter number of columns:");

      function generateTable() {
        let table = document.createElement("table");
        let body = document.createElement("tbody");
        table.appendChild(body);

        let headerRow = document.createElement("tr");
        body.appendChild(headerRow);
        for (var j = 0; j < columns; j++) {
          let headerColumn = document.createElement("th");
          body.appendChild(headerColumn);
          headerColumn.textContent = "Heading " + (j + 1);
        }

        for (let i = 0; i < rows; i++) {
          let row = document.createElement("tr");
          body.appendChild(row);
          for (var j = 0; j < columns; j++) {
            let col = document.createElement("td");
            body.appendChild(col);
            col.textContent = "Row " + (i + 1) + " Col " + (j + 1);
          }
        }

        let tableContainer = document.querySelector("#tableContainer");
        tableContainer.appendChild(table);
      }
      generateTable(rows, columns);
    </script>
  </body>
</html>
