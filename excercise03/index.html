<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Excercise 03</title>
  </head>
  <body>
    <script>
      let numbers = [2, 3, 4, 5, 6, 7, 8, 9, 10];
      let result = [];
      function isPrime(numbers) {
        if (numbers < 2) return false;

        for (let i = 2; i < numbers; i++) {
          if (numbers % i == 0) {
            return false;
          }
        }
        return true;
      }
      numbers.forEach(function (element) {
        const item = isPrime(element);
        if (item) {
          result.push("true");
        } else {
          result.push("false");
        }
      });
      console.log(result);
    </script>
  </body>
</html>
